<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktuális Zene</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #login-btn {
            background-color: #1DB954;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 50px;
        }

        #login-btn:hover { background-color: #1ed760; }

        .container {
            width: 100%;
            max-width: 600px;
            display: none;
        }

        .current-track {
            background-color: #282828;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .current-track img {
            width: 200px;
            height: 200px;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .current-track h2 { margin: 0 0 5px 0; font-size: 24px; }
        .current-track p { margin: 0; color: #b3b3b3; font-size: 18px; }
        .current-track .year { font-size: 14px; margin-top: 10px; color: #1DB954; }

        h3 { border-bottom: 1px solid #282828; padding-bottom: 10px; }

        #history-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #history-list li {
            background-color: #181818;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-info { display: flex; flex-direction: column; }
        .history-title { font-weight: bold; font-size: 16px; }
        .history-artist { color: #b3b3b3; font-size: 14px; }
        .history-year { color: #1DB954; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <button id="login-btn">Bejelentkezés a Spotify-ba</button>

    <div class="container" id="app-container">
        <div class="current-track" id="current-track-div">
            <img id="track-image" src="" alt="Album borító" style="display:none;">
            <h2 id="track-name">Nincs lejátszás</h2>
            <p id="track-artist">-</p>
            <div class="year" id="track-year"></div>
        </div>

        <h3>Előzőleg hallgatott:</h3>
        <ul id="history-list">
        </ul>
    </div>

    <script>
        // --- BEÁLLÍTÁSOK ---
        const CLIENT_ID = 'IDE_MÁSOLD_A_CLIENT_ID_T'; 
        const REDIRECT_URI = 'https://kolomarki08.github.io/zene-figyelo/'; 

        let accessToken = null;
        let currentTrackId = null;
        let currentTrackData = null; 

        document.getElementById('login-btn').addEventListener('click', () => {
            const scope = 'user-read-currently-playing user-read-playback-state';
            const authUrl = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(scope)}`;
            window.location.href = authUrl;
        });

        function getTokenFromUrl() {
            const hash = window.location.hash;
            if (hash) {
                const params = new URLSearchParams(hash.substring(1));
                return params.get('access_token');
            }
            return null;
        }

        window.onload = () => {
            accessToken = getTokenFromUrl();
            if (accessToken) {
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                window.history.pushState("", document.title, window.location.pathname);
                
                fetchCurrentlyPlaying();
                setInterval(fetchCurrentlyPlaying, 5000);
            }
        };

        async function fetchCurrentlyPlaying() {
            try {
                const response = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });

                if (response.status === 204) {
                    return; 
                }

                const data = await response.json();

                if (data && data.item) {
                    const newTrackId = data.item.id;
                    const name = data.item.name;
                    const artist = data.item.artists.map(a => a.name).join(', ');
                    const year = data.item.album.release_date.substring(0, 4); 
                    const imageUrl = data.item.album.images[0].url;

                    if (newTrackId !== currentTrackId) {
                        if (currentTrackData !== null) {
                            addTrackToHistory(currentTrackData);
                        }

                        updateCurrentTrackUI(name, artist, year, imageUrl);
                        
                        currentTrackId = newTrackId;
                        currentTrackData = { name, artist, year };
                    }
                }
            } catch (error) {
                console.error("Hiba történt az API lekérdezés során:", error);
            }
        }

        function updateCurrentTrackUI(name, artist, year, imageUrl) {
            document.getElementById('track-name').innerText = name;
            document.getElementById('track-artist').innerText = artist;
            document.getElementById('track-year').innerText = year;
            
            const imgEl = document.getElementById('track-image');
            imgEl.src = imageUrl;
            imgEl.style.display = 'block';
        }

        function addTrackToHistory(track) {
            const list = document.getElementById('history-list');
            const li = document.createElement('li');

            li.innerHTML = `
                <div class="history-info">
                    <span class="history-title">${track.name}</span>
                    <span class="history-artist">${track.artist}</span>
                </div>
                <div class="history-year">${track.year}</div>
            `;

            list.prepend(li); 
        }
    </script>
</body>
</html>
