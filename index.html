<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktuális Zene</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #login-btn {
            background-color: #1DB954;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 50px;
        }

        #login-btn:hover { background-color: #1ed760; }

        .container {
            width: 100%;
            max-width: 600px;
            display: none;
        }

        .current-track {
            background-color: #282828;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .current-track img {
            width: 200px;
            height: 200px;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .current-track h2 { margin: 0 0 5px 0; font-size: 24px; }
        .current-track p { margin: 0; color: #b3b3b3; font-size: 18px; }
        .current-track .year { font-size: 14px; margin-top: 10px; color: #1DB954; }

        h3 { border-bottom: 1px solid #282828; padding-bottom: 10px; }

        #history-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #history-list li {
            background-color: #181818;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-info { display: flex; flex-direction: column; }
        .history-title { font-weight: bold; font-size: 16px; }
        .history-artist { color: #b3b3b3; font-size: 14px; }
        .history-year { color: #1DB954; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <button id="login-btn">Bejelentkezés a Spotify-ba</button>

    <div class="container" id="app-container">
        <div class="current-track" id="current-track-div">
            <img id="track-image" src="" alt="Album borító" style="display:none;">
            <h2 id="track-name">Nincs lejátszás</h2>
            <p id="track-artist">-</p>
            <div class="year" id="track-year"></div>
        </div>

        <h3>Előzőleg hallgatott:</h3>
        <ul id="history-list">
        </ul>
    </div>

    <script>
        // --- BEÁLLÍTÁSOK ---
        const CLIENT_ID = 'a4404abee2834385b5c27caf0f358143'; 
        const REDIRECT_URI = 'https://kolomarki08.github.io/zene-figyelo/'; 

        let accessToken = null;
        let currentTrackId = null;
        let currentTrackData = null; 

        // --- PKCE BIZTONSÁGI FÜGGVÉNYEK ---
        const generateRandomString = (length) => {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            const values = crypto.getRandomValues(new Uint8Array(length));
            return values.reduce((acc, x) => acc + possible[x % possible.length], "");
        };

        const sha256 = async (plain) => {
            const encoder = new TextEncoder();
            const data = encoder.encode(plain);
            return window.crypto.subtle.digest('SHA-256', data);
        };

        const base64encode = (input) => {
            return btoa(String.fromCharCode(...new Uint8Array(input)))
                .replace(/=/g, '')
                .replace(/\+/g, '-')
                .replace(/\//g, '_');
        };

        // 1. Gomb kattintás - Titkosított lekérés indítása
        document.getElementById('login-btn').addEventListener('click', async () => {
            const codeVerifier = generateRandomString(64);
            window.localStorage.setItem('code_verifier', codeVerifier);
            const hashed = await sha256(codeVerifier);
            const codeChallenge = base64encode(hashed);

            const scope = 'user-read-currently-playing user-read-playback-state';
            const authUrl = new URL("https://accounts.spotify.com/authorize");

            const params = {
                response_type: 'code',
                client_id: CLIENT_ID,
                scope: scope,
                code_challenge_method: 'S256',
                code_challenge: codeChallenge,
                redirect_uri: REDIRECT_URI,
            };

            authUrl.search = new URLSearchParams(params).toString();
            window.location.href = authUrl.toString();
        });

        // 2. Token becserélése a kapott kóddal
        async function getToken(code) {
            let codeVerifier = localStorage.getItem('code_verifier');

            const payload = {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: new URLSearchParams({
                    client_id: CLIENT_ID,
                    grant_type: 'authorization_code',
                    code: code,
                    redirect_uri: REDIRECT_URI,
                    code_verifier: codeVerifier,
                }),
            }

            try {
                const body = await fetch("https://accounts.spotify.com/api/token", payload);
                const response = await body.json();
                return response.access_token;
            } catch (error) {
                console.error("Hiba a token generálásakor:", error);
                return null;
            }
        }

        // 3. Inicializálás az oldal betöltésekor
        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            let code = urlParams.get('code');

            if (code) {
                document.getElementById('login-btn').style.display = 'none';
                
                accessToken = await getToken(code);
                
                if (accessToken) {
                    document.getElementById('app-container').style.display = 'block';
                    // Eltüntetjük a hosszú kódot az URL-ből
                    window.history.pushState("", document.title, window.location.pathname);
                    
                    fetchCurrentlyPlaying();
                    setInterval(fetchCurrentlyPlaying, 5000);
                }
            }
        };

        // 4. Aktuális zene lekérése
        async function fetchCurrentlyPlaying() {
            if (!accessToken) return;

            try {
                const response = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });

                if (response.status === 204) return; 

                const data = await response.json();

                if (data && data.item) {
                    const newTrackId = data.item.id;
                    const name = data.item.name;
                    const artist = data.item.artists.map(a => a.name).join(', ');
                    const year = data.item.album.release_date.substring(0, 4); 
                    const imageUrl = data.item.album.images[0].url;

                    if (newTrackId !== currentTrackId) {
                        if (currentTrackData !== null) {
                            addTrackToHistory(currentTrackData);
                        }

                        updateCurrentTrackUI(name, artist, year, imageUrl);
                        
                        currentTrackId = newTrackId;
                        currentTrackData = { name, artist, year };
                    }
                }
            } catch (error) {
                console.error("Hiba történt az API lekérdezés során:", error);
            }
        }

        // 5. Felület frissítése
        function updateCurrentTrackUI(name, artist, year, imageUrl) {
            document.getElementById('track-name').innerText = name;
            document.getElementById('track-artist').innerText = artist;
            document.getElementById('track-year').innerText = year;
            
            const imgEl = document.getElementById('track-image');
            imgEl.src = imageUrl;
            imgEl.style.display = 'block';
        }

        // 6. Előzmények listázása
        function addTrackToHistory(track) {
            const list = document.getElementById('history-list');
            const li = document.createElement('li');

            li.innerHTML = `
                <div class="history-info">
                    <span class="history-title">${track.name}</span>
                    <span class="history-artist">${track.artist}</span>
                </div>
                <div class="history-year">${track.year}</div>
            `;

            list.prepend(li); 
        }
    </script>
</body>
</html>
